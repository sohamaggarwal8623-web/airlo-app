<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Airlo - Airport Search</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>✈ Airlo</h1>
    <p>Search Airports by IATA Code or City</p>
  </header>

  <main>

    <div class="search-box">

      <input
        type="text"
        id="searchInput"
        placeholder="Search by airport, city, country or IATA code..."
      >

    </div>

    <div id="results"></div>

  </main>

  <footer>

    <div class="footer-section">
      <h3>Help</h3>
      <p>Search airports using city names or IATA codes.</p>
    </div>

    <div class="footer-section">
      <h3>Contact</h3>
      <p>Email: support@airlo.com</p>
    </div>

    <div class="footer-section">
      <h3>Follow Us</h3>

      <div class="socials">
        <a href="#">Instagram</a>
        <a href="#">Twitter</a>
        <a href="#">LinkedIn</a>
      </div>

    </div>

  </footer>

  <script src="script.js"></script>

</body>
</html>
